name: CI/CD

# Runs lint + type-check + build on every push and PR against main.
# On a successful push to main, triggers a Firebase App Hosting rollout.
#
# --- One-time setup before the deploy job will work ---
# 1. Create an App Hosting backend (Firebase Console -> Build -> App Hosting,
#    or `firebase apphosting:backends:create`). Note its backend ID.
# 2. Create a Google Cloud service account with the "Firebase App Hosting
#    Admin" role (and "Service Account User" on the backend's service
#    account), download its JSON key.
# 3. Add these as GitHub repo secrets (Settings -> Secrets and variables ->
#    Actions):
#      FIREBASE_SERVICE_ACCOUNT       - the full JSON key content
#      FIREBASE_PROJECT_ID            - your Firebase project ID
#      FIREBASE_APP_HOSTING_BACKEND_ID - the backend ID from step 1
#    Optionally also add the NEXT_PUBLIC_FIREBASE_* / CLOUDINARY_* values
#    used below so the CI build step matches your real environment (the
#    build succeeds without them too - this app reads them defensively).
#
# Note: Firebase App Hosting can alternatively auto-deploy on push by
# linking your GitHub repo directly in the Firebase Console, with no
# GitHub Actions step required. The `deploy` job below is for teams who
# want deployment explicitly gated behind the `ci` job passing first.
# Verify `apphosting:rollouts:create`'s exact flags for your installed
# firebase-tools version with `npx firebase-tools apphosting:rollouts:create --help`
# if the deploy step errors on flag names.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"

jobs:
  ci:
    name: Lint, Type-check, Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

  deploy:
    name: Deploy to Firebase App Hosting
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Trigger App Hosting rollout
        run: |
          npx firebase-tools@latest apphosting:rollouts:create \
            "${{ secrets.FIREBASE_APP_HOSTING_BACKEND_ID }}" \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --force
